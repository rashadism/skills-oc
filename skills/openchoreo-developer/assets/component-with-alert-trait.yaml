apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: <COMPONENT_NAME>
  namespace: default
spec:
  owner:
    projectName: default
  componentType:
    kind: ClusterComponentType
    name: deployment/service
  autoDeploy: true
  traits:
    - kind: ClusterTrait
      name: observability-alert-rule
      instanceName: high-error-rate-log-alert
      parameters:
        description: "Error logs exceed threshold over 5m window"
        severity: critical
        source:
          type: log
          query: "status:error"
        condition:
          window: 5m
          interval: 1m
          operator: gt
          threshold: 50
    - kind: ClusterTrait
      name: observability-alert-rule
      instanceName: high-cpu-metric-alert
      parameters:
        description: "CPU usage above 80% sustained for 5m"
        severity: warning
        source:
          type: metric
          metric: cpu_usage
        condition:
          window: 5m
          interval: 1m
          operator: gt
          threshold: 80
